# postgresql.conf — tuned for MacBook Air M1, 8 GB RAM
# Container memory limit: 512 MB (set in docker-compose.prod.yml)
# This config is conservative to leave headroom for other containers.

# ── Connection settings ───────────────────────────────────────────────────────
listen_addresses = '*'          # accept connections from Docker bridge
port = 5432
max_connections = 50            # API uses asyncpg pool (default 10); 50 is plenty

# ── Memory ───────────────────────────────────────────────────────────────────
# shared_buffers: ~25% of container limit (512 MB → 128 MB)
shared_buffers = 128MB

# effective_cache_size: estimate of OS + shared_buffers available for caching.
# Keep low to avoid over-optimistic query plans (container sees only 512 MB).
effective_cache_size = 384MB

# work_mem: per sort/hash operation. 4 MB × 50 connections × 2 ops = 400 MB peak.
# Keep small to stay within budget.
work_mem = 4MB

# maintenance_work_mem: used for VACUUM, CREATE INDEX, etc.
maintenance_work_mem = 64MB

# ── WAL / Checkpoint ─────────────────────────────────────────────────────────
wal_level = replica             # minimal is fine but replica allows pg_basebackup
max_wal_size = 512MB
min_wal_size = 80MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# ── Planner ──────────────────────────────────────────────────────────────────
# M1 NVMe is fast; lower the penalty for random I/O
random_page_cost = 1.1
effective_io_concurrency = 200  # SSD: can issue many concurrent I/O requests
default_statistics_target = 100

# ── Logging ──────────────────────────────────────────────────────────────────
log_timezone = 'UTC'
log_destination = 'stderr'
logging_collector = off         # Docker captures stderr; no need for file logging
log_min_duration_statement = 1000   # log queries slower than 1 s
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_line_prefix = '%t [%p] %q%u@%d '

# ── Autovacuum ───────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 2      # limit CPU usage; default is 3
autovacuum_naptime = 60s
autovacuum_vacuum_cost_delay = 20ms

# ── Miscellaneous ─────────────────────────────────────────────────────────────
timezone = 'UTC'
datestyle = 'iso, mdy'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
dynamic_shared_memory_type = posix
