databases:
  - name: trading-os-db
    databaseName: trading_os
    user: trading
    plan: free

services:
  - type: web
    name: trading-os
    runtime: docker
    dockerfilePath: ./infrastructure/Dockerfile
    dockerContext: .
    plan: free
    numInstances: 1  # AppState (portfolio, event log, websocket clients) is
                     # process-local — see infrastructure/Dockerfile's
                     # --workers 1 comment. Do not scale this beyond 1
                     # instance without first externalizing that state.
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trading-os-db
          property: connectionString
      - key: MOCK_MODE
        value: "true"  # flip to "false" once real broker/data-feed keys are set below
      - key: API_AUTH_TOKEN
        sync: false   # set in the Render dashboard; protects trade/portfolio-mutation endpoints
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

# Redis and Kafka are both optional (NewsCache and the event bus already
# fall back to in-memory implementations when unconfigured) and are left
# out of this Blueprint to keep the default deploy to one paid-free-tier
# service. Add a Render Key Value instance and set REDIS_URL if you want
# news-sentiment caching to survive restarts.
