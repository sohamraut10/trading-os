name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trading_os_test
          POSTGRES_USER: trading
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U trading"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt ruff

      - name: Lint with ruff
        run: |
          ruff check api/ core/ config/ --output-format=github
          ruff format --check api/ core/ config/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://trading:testpassword@localhost:5432/trading_os_test
          REDIS_URL: redis://localhost:6379
          MOCK_MODE: "true"
          ANTHROPIC_API_KEY: "test-key-not-real"
          ALPACA_API_KEY: ""
          ALPACA_SECRET_KEY: ""
          BINANCE_API_KEY: ""
          BINANCE_SECRET: ""
          NEWS_API_KEY: ""
        run: |
          pytest tests/ -v --tb=short --timeout=60

  # ── Build Docker image (push to master only) ────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/Dockerfile
          platforms: linux/arm64
          push: false
          tags: trading-os-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      - name: Build Frontend image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/Dockerfile.frontend
          platforms: linux/arm64
          push: false
          tags: trading-os-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── SSH Deploy to MacBook ────────────────────────────────────────────────────
  deploy:
    name: Deploy to MacBook
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    timeout-minutes: 15
    environment: production   # optional: add manual approval gate in GitHub settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd /Users/${{ secrets.SSH_USER }}/trading-os-1 && \
             bash infrastructure/scripts/deploy.sh"

      - name: Verify deployment
        run: |
          # Wait for API to come up then hit the health endpoint via Cloudflare tunnel
          sleep 20
          curl -f --max-time 15 "https://api.${{ secrets.DOMAIN }}/health" || \
            echo "WARNING: health check via tunnel timed out (tunnel may still be starting)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy failed. Check GitHub Actions logs and run on the MacBook:"
          echo "  docker compose -f docker-compose.prod.yml logs --tail=100 api"
