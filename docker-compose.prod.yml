# Production compose — MacBook Air M1 (ARM64)
# Run with:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# All external traffic enters through Cloudflare Tunnel → Caddy; no host
# ports are published except Caddy's 80/443 for loopback health checks.

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart
  restart: unless-stopped

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  monitoring:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  backups:
    driver: local

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Caddy — reverse proxy ───────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    platform: linux/arm64
    <<: *restart
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./infrastructure/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend
      - monitoring
    environment:
      DOMAIN: ${DOMAIN}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/caddy-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Frontend — nginx serving Vite build ─────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.${DOMAIN}}
        VITE_WS_URL: ${VITE_WS_URL:-wss://api.${DOMAIN}}
    platform: linux/arm64
    <<: *restart
    networks:
      - frontend
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
      - /var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/nginx-health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      VITE_API_URL: ${VITE_API_URL:-https://api.${DOMAIN}}
      VITE_WS_URL: ${VITE_WS_URL:-wss://api.${DOMAIN}}
    logging: *default-logging

  # ── API — FastAPI with uvicorn ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile
    platform: linux/arm64
    <<: *restart
    networks:
      - frontend
      - backend
      - monitoring
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET: ${BINANCE_SECRET}
      NEWS_API_KEY: ${NEWS_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID}
      DHAN_ACCESS_TOKEN: ${DHAN_ACCESS_TOKEN}
      DATABASE_URL: postgresql+asyncpg://trading:${POSTGRES_PASSWORD}@postgres:5432/trading_os
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
      CRON_SECRET: ${CRON_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://trade.${DOMAIN}}
      ENABLE_LIVE_SUGGESTIONS: ${ENABLE_LIVE_SUGGESTIONS:-true}
      LIVE_SUGGESTIONS_ASSETS: ${LIVE_SUGGESTIONS_ASSETS:-BTCUSDT,ETHUSDT}
      LIVE_SUGGESTIONS_INTERVAL_SEC: ${LIVE_SUGGESTIONS_INTERVAL_SEC:-60}
      AUTO_EXECUTE_SIGNALS: ${AUTO_EXECUTE_SIGNALS:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      MOCK_MODE: ${MOCK_MODE:-false}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1536M
    logging: *default-logging

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    platform: linux/arm64
    <<: *restart
    networks:
      - backend
    environment:
      POSTGRES_DB: trading_os
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infrastructure/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - backups:/backups
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_os"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    <<: *restart
    networks:
      - backend
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 640M
    logging: *default-logging

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    platform: linux/arm64
    <<: *restart
    networks:
      - monitoring
      - backend
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=4GB"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    platform: linux/arm64
    <<: *restart
    networks:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      GF_LOG_LEVEL: warn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

  # ── Cloudflare Tunnel ────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    platform: linux/arm64
    <<: *restart
    networks:
      - frontend
      - monitoring
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./infrastructure/cloudflared:/etc/cloudflared:ro
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      caddy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ── Watchtower — disabled: containrrr/watchtower uses Docker API 1.25 which
  # is below Docker Desktop's minimum (1.40). Update third-party images manually:
  #   docker compose -f docker-compose.prod.yml pull && docker compose up -d
  # Uncomment and try a newer watchtower release if this is ever fixed upstream.
  # watchtower:
  #   image: containrrr/watchtower:latest
